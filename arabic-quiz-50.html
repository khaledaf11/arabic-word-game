<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة اختبار النحو العربي</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0c29;--bg2:#302b63;--bg3:#24243e;--accent1:#667eea;--accent2:#764ba2;--accent3:#a78bfa;--text:#f3f0ff;--text2:#c4b5fd;--text3:rgba(255,255,255,0.4);--success:#22c55e;--danger:#ef4444;--warn:#f59e0b;--radius:20px;--radius-sm:14px;--transition:0.25s cubic-bezier(0.22,1,0.36,1)}
body{font-family:'Readex Pro','Noto Naskh Arabic',sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2),var(--bg3));min-height:100vh;padding:20px;color:var(--text)}
::selection{background:var(--accent3);color:#fff}
.container{max-width:920px;margin:0 auto}
.btn{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;padding:12px 32px;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;transition:var(--transition);font-family:'Readex Pro',sans-serif;display:inline-flex;align-items:center;gap:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(102,126,234,0.35)}
.btn:active{transform:translateY(0)}
.btn-outline{background:transparent;border:2px solid rgba(167,139,250,0.4);color:var(--text2)}
.btn-outline:hover{background:rgba(167,139,250,0.1);border-color:var(--accent3);box-shadow:none}
.btn-sm{padding:8px 20px;font-size:14px;border-radius:12px}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.header{background:linear-gradient(135deg,var(--accent1),var(--accent2));padding:36px 32px;border-radius:28px;text-align:center;margin-bottom:28px;box-shadow:0 15px 50px rgba(102,126,234,0.25);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 60%);animation:hGlow 6s ease-in-out infinite}
@keyframes hGlow{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.08) rotate(2deg)}}
.header h1{font-size:30px;font-weight:700;color:#fff;margin-bottom:6px;position:relative}
.header p{font-size:16px;color:rgba(255,255,255,0.8);position:relative}
.breadcrumb{display:flex;gap:8px;align-items:center;padding:10px 18px;background:rgba(255,255,255,0.04);border-radius:12px;margin-bottom:18px;font-size:14px;flex-wrap:wrap}
.breadcrumb .sep{color:rgba(255,255,255,0.15)}
.breadcrumb .link{color:var(--accent3);cursor:pointer;transition:color 0.2s}
.breadcrumb .link:hover{color:var(--text2)}
.breadcrumb .active{color:var(--text);font-weight:600}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.cat-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:22px 18px;cursor:pointer;transition:var(--transition);text-align:center}
.cat-card:hover{background:rgba(255,255,255,0.09);border-color:rgba(167,139,250,0.3);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.15)}
.cat-card .icon{font-size:40px;margin-bottom:8px}
.cat-card .name{font-size:18px;font-weight:600;color:var(--text)}
.cat-card .count{font-size:13px;color:var(--text3);margin-top:3px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:28px}
.topic-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px 10px;cursor:pointer;transition:var(--transition);text-align:center;position:relative}
.topic-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(167,139,250,0.25);transform:translateY(-3px)}
.topic-card .emoji{font-size:26px;margin-bottom:4px}
.topic-card .name{font-size:14px;font-weight:600;color:var(--text)}
.topic-card .badge{font-size:11px;color:var(--text3);margin-top:2px}
.topic-card.full{grid-column:1/-1;border-style:dashed;border-color:rgba(244,114,182,0.25);background:rgba(244,114,182,0.04)}
.topic-card.full:hover{border-color:rgba(244,114,182,0.4)}
.topic-card.full .name{color:#f472b6}
.stats{display:flex;justify-content:space-between;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:12px 18px;margin-bottom:18px;flex-wrap:wrap;gap:6px}
.stat{text-align:center}
.stat-lbl{font-size:11px;color:var(--text3)}
.stat-val{font-size:20px;font-weight:700;color:var(--text2);font-family:'Readex Pro',sans-serif}
.pbar{background:rgba(255,255,255,0.06);border-radius:99px;height:7px;margin-bottom:18px;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent1),var(--accent3),#f472b6);background-size:200% 100%;animation:pShimmer 3s ease infinite;transition:width 0.5s cubic-bezier(0.22,1,0.36,1)}
@keyframes pShimmer{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.pag{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.pdot{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02);cursor:pointer;font-size:11px;font-weight:600;transition:var(--transition);font-family:'Readex Pro',sans-serif;color:rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center}
.pdot:hover{border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.06);transform:scale(1.08)}
.pdot.cur{background:linear-gradient(135deg,var(--accent1),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(102,126,234,0.3)}
.pdot.done{border-color:rgba(167,139,250,0.3);color:var(--text2);background:rgba(167,139,250,0.08)}
.pdot.cr{background:linear-gradient(135deg,var(--success),#16a34a);border-color:transparent;color:#fff}
.pdot.wr{background:linear-gradient(135deg,var(--danger),#dc2626);border-color:transparent;color:#fff}
.qcard{background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:26px 24px;margin-bottom:14px;animation:fadeUp 0.4s cubic-bezier(0.22,1,0.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.qnum{display:inline-block;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;padding:4px 14px;border-radius:99px;font-size:12px;font-weight:600;margin-bottom:12px;font-family:'Readex Pro',sans-serif}
.qtext{font-size:22px;font-weight:600;color:var(--text);margin-bottom:22px;line-height:1.7}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:rgba(255,255,255,0.03);border:2px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);padding:13px 18px;font-size:18px;cursor:pointer;transition:var(--transition);text-align:right;color:#e2d9ff}
.opt:hover{background:rgba(255,255,255,0.06);border-color:rgba(167,139,250,0.3);transform:translateX(-3px)}
.opt .l{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:rgba(255,255,255,0.04);border-radius:50%;font-weight:700;font-size:13px;margin-left:10px;color:rgba(255,255,255,0.35);transition:var(--transition);font-family:'Readex Pro',sans-serif}
.opt.selected{background:rgba(102,126,234,0.12);border-color:var(--accent3);color:var(--text)}
.opt.selected .l{background:rgba(167,139,250,0.25);color:var(--text2)}
.opt.correct{background:rgba(34,197,94,0.12);border-color:var(--success);color:#86efac;font-weight:600;animation:pulseG 0.5s ease}
.opt.correct .l{background:rgba(34,197,94,0.25);color:#86efac}
@keyframes pulseG{0%{box-shadow:0 0 0 0 rgba(34,197,94,0.3)}70%{box-shadow:0 0 0 14px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.opt.wrong{background:rgba(239,68,68,0.12);border-color:var(--danger);color:#fca5a5;font-weight:600;animation:pulseR 0.5s ease}
.opt.wrong .l{background:rgba(239,68,68,0.25);color:#fca5a5}
@keyframes pulseR{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)}70%{box-shadow:0 0 0 14px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.opt.disabled{pointer-events:none;cursor:default}
.fb{padding:12px 18px;border-radius:12px;margin-top:10px;font-size:16px;line-height:1.6;display:none}
.fb.show{display:block;animation:fadeUp 0.3s ease}
.fb.ok{background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.15);color:#86efac}
.fb.fail{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.15);color:#fca5a5}
.nav-row{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
.result-wrap{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:32px 24px;text-align:center;animation:fadeUp 0.5s ease}
.result-wrap .icon{font-size:72px;margin-bottom:8px;animation:boing 2s ease infinite}
@keyframes boing{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.result-wrap .score{font-size:54px;font-weight:700;color:var(--text2);font-family:'Readex Pro',sans-serif;line-height:1}
.result-wrap .sub{font-size:17px;color:var(--text3);margin-top:3px}
.result-wrap .details{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.result-wrap .det{background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.05)}
.result-wrap .det .n{font-size:26px;font-weight:700}
.result-wrap .det .l{font-size:13px;color:var(--text3);margin-top:2px}
.result-wrap .msg{padding:14px 18px;border-radius:14px;font-size:18px;font-weight:600;margin:14px 0}
.result-wrap .msg.ex{background:rgba(34,197,94,0.09);color:#86efac;border:1px solid rgba(34,197,94,0.12)}
.result-wrap .msg.gd{background:rgba(234,179,8,0.09);color:#fde68a;border:1px solid rgba(234,179,8,0.12)}
.result-wrap .msg.ok{background:rgba(249,115,22,0.09);color:#fdba74;border:1px solid rgba(249,115,22,0.12)}
.result-wrap .msg.low{background:rgba(239,68,68,0.09);color:#fca5a5;border:1px solid rgba(239,68,68,0.12)}
.result-wrap .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.review{border:1px solid rgba(255,255,255,0.05);border-radius:var(--radius);padding:20px;margin-top:20px}
.review h3{font-size:17px;margin-bottom:12px;color:var(--text2)}
.review-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.review-item:last-child{border-bottom:none}
.review-item .rq{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.review-item .ra{font-size:13px;color:var(--text3)}
.review-item .ra .ok{color:var(--success)}
.review-item .ra .fail{color:var(--danger)}
.backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;display:none;justify-content:center;align-items:center}
.backdrop.show{display:flex}
.modal{background:rgba(30,27,55,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:28px;max-width:420px;width:90%;text-align:center;animation:fadeUp 0.3s ease}
.modal h3{font-size:18px;margin-bottom:8px}
.modal p{font-size:14px;color:var(--text3);margin-bottom:16px}
.modal .actions{display:flex;gap:10px;justify-content:center}
</style>
</head>

function _norm(arr) {
  var out = [];
  for (var i = 0; i < arr.length; i++) {
    out.push({ question: arr[i].q, options: arr[i].o.slice(), correct: arr[i].c, exp: arr[i].e });
  }
  return out;
}

function _shuffleOpts(q) {
  var opts = q.options.slice();
  var correctText = opts[q.correct];
  for (var i = opts.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = opts[i]; opts[i] = opts[j]; opts[j] = tmp;
  }
  var newCorrect = 0;
  for (var k = 0; k < opts.length; k++) { if (opts[k] === correctText) { newCorrect = k; break; } }
  return { question: q.question, options: opts, correct: newCorrect, exp: q.exp };
}

function QuestionBank() {
  this._store = {};
  var self = this;
  Object.keys(_META).forEach(function(cat) {
    self._store[cat] = {};
    _META[cat].topics.forEach(function(topic) {
      if (BASE[cat] && BASE[cat][topic]) {
        self._store[cat][topic] = _norm(expand(BASE[cat][topic], 6));
      } else {
        var qs = [];
        for (var i = 0; i < 60; i++) {
          qs.push({question:'سؤال عن ' + topic + ' رقم ' + (i+1),options:['خيار أ','خيار ب','خيار ج','خيار د'],correct:0,exp:'شرح الإجابة.'});
        }
        self._store[cat][topic] = qs;
      }
    });
  });
}

QuestionBank.prototype.categories = function() { return Object.keys(_META); };
QuestionBank.prototype.meta = function(c) { return _META[c] || null; };
QuestionBank.prototype.topics = function(c) { return _META[c] ? _META[c].topics.slice() : []; };
QuestionBank.prototype.questions = function(c, t) { return this._store[c] && this._store[c][t] ? this._store[c][t].slice() : []; };
QuestionBank.prototype.count = function(c) {
  var n = 0, self = this;
  _META[c].topics.forEach(function(t) { n += self.questions(c, t).length; });
  return n;
};
QuestionBank.prototype.pick = function(c, t, n) {
  n = n || 50;
  var pool = this.questions(c, t);
  var shuffled = pool.slice().sort(function() { return Math.random() - 0.5; });
  var selected = shuffled.slice(0, Math.min(n, shuffled.length));
  for (var i = 0; i < selected.length; i++) { selected[i] = _shuffleOpts(selected[i]); }
  return selected;
};
QuestionBank.prototype.pickAll = function(c, n) {
  n = n || 50;
  var all = [], self = this;
  _META[c].topics.forEach(function(t) {
    self._store[c][t].forEach(function(q) { all.push({ question: q.question, options: q.options.slice(), correct: q.correct, exp: q.exp, _topic: t }); });
  });
  var selected = all.sort(function() { return Math.random() - 0.5; }).slice(0, Math.min(n, all.length));
  for (var i = 0; i < selected.length; i++) { selected[i] = _shuffleOpts(selected[i]); }
  return selected;
};

Object.defineProperty(QuizManager.prototype, 'total', { get: function() { return this.questions.length; } });
Object.defineProperty(QuizManager.prototype, 'answered', { get: function() { var n = 0; for (var i = 0; i < this.answers.length; i++) { if (this.answers[i] !== null) n++; } return n; } });
Object.defineProperty(QuizManager.prototype, 'correct', { get: function() { var n = 0; for (var i = 0; i < this.answers.length; i++) { if (this.answers[i] === this.questions[i].correct) n++; } return n; } });
Object.defineProperty(QuizManager.prototype, 'pct', { get: function() { return this.total ? Math.round(this.answered / this.total * 100) : 0; } });
Object.defineProperty(QuizManager.prototype, 'hasPrev', { get: function() { return this.idx > 0; } });
Object.defineProperty(QuizManager.prototype, 'hasNext', { get: function() { return this.idx < this.total - 1; } });
Object.defineProperty(QuizManager.prototype, 'isCurrentAnswered', { get: function() { return this.answers[this.idx] !== null; } });
QuizManager.prototype.answer = function(i) { if (!this.done && !this.isCurrentAnswered) this.answers[this.idx] = i; };
QuizManager.prototype.goNext = function() { if (this.hasNext) { this.idx++; return true; } return false; };
QuizManager.prototype.goPrev = function() { if (this.hasPrev) { this.idx--; return true; } return false; };
QuizManager.prototype.goTo = function(i) { if (i >= 0 && i < this.total) { this.idx = i; return true; } return false; };
QuizManager.prototype.submit = function() { this.done = true; };
QuizManager.prototype.getResults = function() {
  var t = this.total, c = this.correct, w = this.answered - c, u = t - this.answered, p = Math.round(c / t * 100);
  var g, ic, msg;
  if (p >= 90) { g = 'ex'; ic = '🏆'; msg = 'ممتاز! مستوى عالٍ جداً في النحو العربي!'; }
  else if (p >= 75) { g = 'gd'; ic = '🌟'; msg = 'جيد جداً! لديك إلمام قوي بقواعد النحو.'; }
  else if (p >= 50) { g = 'ok'; ic = '📚'; msg = 'مقبول! تحتاج إلى مراجعة بعض القواعد.'; }
  else { g = 'low'; ic = '💪'; msg = 'حاول مرة أخرى! راجع الدروس واستمر.'; }
  return { total: t, correct: c, wrong: w, unanswered: u, pct: p, grade: g, icon: ic, msg: msg };
};

var _EMOJI = {
  'المبتدأ':'📖','الخبر':'💬','الفاعل':'👤','نائب الفاعل':'🔄','اسم كان':'🔷','خبر إن':'🔶',
  'المفعول به':'🎯','المفعول المطلق':'⚡','المفعول لأجله':'🎯','الحال':'📋','اسم إن':'🔷','خبر كان':'🔶','المستثنى':'🚫',
  'المجرور بحرف الجر':'📎','المضاف إليه':'🔗',
  'الابتداء':'🚩','الاستثناء':'🚫','الاستدراك':'🔄','الاستفتاح':'🔔','الاستفهام':'❓',
  'التحضيض':'⚡','التمني':'🌟','التوكيد':'💢','الشرط':'🔀','الظرفية':'📍',
  'النفي':'🚫','النهي':'⛔','الوقاية':'🛡️','النداء':'📢','العطف':'➕',
  'التعليل':'💡','التنبيه':'🔔','الجواب':'💬'
};
var LETTERS = ['أ','ب','ج','د'];

function UIController() {
  this.qb = new QuestionBank();
  this.qm = new QuizManager();
  this.app = document.getElementById('app');
  this.renderHome();
}
UIController.prototype.renderHome = function() {
  var self = this;
  var cats = this.qb.categories();
  var html = '<div class="header"><h1>📝 منصة اختبار النحو العربي</h1><p>اختر تصنيفاً لتبدأ اختبار قواعد اللغة العربية</p></div><div class="cat-grid">';
  cats.forEach(function(c) {
    var m = self.qb.meta(c);
    var n = self.qb.count(c);
    html += '<div class="cat-card" onclick="ui.openCategory(\'' + c + '\')"><div class="icon">' + m.icon + '</div><div class="name">' + c + '</div><div class="count">' + m.topics.length + ' موضوعات • ' + n + ' سؤالاً</div></div>';
  });
  html += '</div>';
  this.app.innerHTML = html;
};
UIController.prototype.openCategory = function(cat) {
  var self = this;
  var m = this.qb.meta(cat);
  var topics = this.qb.topics(cat);
  var html = '<div class="breadcrumb"><span class="link" onclick="ui.renderHome()">التصنيفات</span><span class="sep">›</span><span class="active">' + m.icon + ' ' + cat + '</span></div>';
  html += '<div style="text-align:center;padding:4px 0 14px"><h2 style="font-size:21px;font-weight:600">' + m.icon + ' ' + cat + '</h2><p style="color:var(--text3);font-size:14px">' + m.desc + '</p></div><div class="topic-grid">';
  topics.forEach(function(t) {
    var n = self.qb.questions(cat, t).length;
    var em = _EMOJI[t] || '📌';
    html += '<div class="topic-card" onclick="ui.startQuiz(\'' + cat + '\',\'' + t + '\')"><div class="emoji">' + em + '</div><div class="name">' + t + '</div><div class="badge">' + n + ' سؤالاً</div></div>';
  });
  html += '<div class="topic-card full" onclick="ui.startAllQuiz(\'' + cat + '\')"><div class="emoji">🎲</div><div class="name">🧩 جميع موضوعات ' + cat + '</div><div class="badge">' + this.qb.count(cat) + ' سؤالاً • عشوائي</div></div>';
  html += '</div>';
  this.app.innerHTML = html;
};
UIController.prototype.startQuiz = function(cat, topic) {
  var qs = this.qb.pick(cat, topic, 50);
  if (qs.length === 0) { this.toast('لا توجد أسئلة كافية'); return; }
  this.qm.load(cat, topic, qs);
  this.renderQuiz();
};
UIController.prototype.startAllQuiz = function(cat) {
  var qs = this.qb.pickAll(cat, 50);
  if (qs.length === 0) { this.toast('لا توجد أسئلة كافية'); return; }
  this.qm.load(cat, 'جميع الموضوعات', qs);
  this.qm.allMode = true;
  this.renderQuiz();
};
UIController.prototype.renderQuiz = function() {
  var self = this;
  var q = this.qm.q;
  if (!q) return;
  var i = this.qm.idx, T = this.qm.total;
  var m = this.qb.meta(this.qm.cat);
  var dots = '';
  for (var j = 0; j < this.qm.questions.length; j++) {
    var cls = 'pdot';
    if (j === i) cls += ' cur';
    else if (this.qm.done) cls += (this.qm.answers[j] === this.qm.questions[j].correct) ? ' cr' : (this.qm.answers[j] !== null ? ' wr' : '');
    else if (this.qm.answers[j] !== null) cls += ' done';
    dots += '<div class="' + cls + '" onclick="ui.goTo(' + j + ')">' + (j + 1) + '</div>';
  }
  var isA = this.qm.isCurrentAnswered;
  var ans = this.qm.answers[i];
  var opts = '';
  for (var j = 0; j < q.options.length; j++) {
    var cls = isA ? 'opt disabled' : 'opt';
    if (isA) {
      if (j === q.correct) cls += ' correct';
      else if (j === ans) cls += ' wrong';
    }
    opts += '<div class="' + cls + '" onclick="ui.select(' + j + ')"><span class="l">' + LETTERS[j] + '</span> ' + q.options[j] + '</div>';
  }
  var fb = '';
  if (isA) {
    var ok = ans === q.correct;
    fb = '<div class="fb show ' + (ok ? 'ok' : 'fail') + '">' + (ok ? '✅ صحيح!' : '❌ خطأ.') + ' ' + (q.exp || '') + '</div>';
  }
  var nextBtn = this.qm.hasNext
    ? '<button class="btn btn-sm" onclick="ui.next()">التالي →</button>'
    : '<button class="btn btn-sm" onclick="ui.finish()">' + (this.qm.answered === T ? 'عرض النتيجة 🏁' : 'إنهاء 🏁') + '</button>';
  var html = '<div class="breadcrumb"><span class="link" onclick="ui.renderHome()">التصنيفات</span><span class="sep">›</span>';
  html += '<span class="link" onclick="ui.openCategory(\'' + this.qm.cat + '\')">' + m.icon + ' ' + this.qm.cat + '</span><span class="sep">›</span><span class="active">' + this.qm.topic + '</span></div>';
  html += '<div class="stats"><div class="stat"><div class="stat-lbl">تمت الإجابة</div><div class="stat-val">' + this.qm.answered + '</div></div>';
  html += '<div class="stat"><div class="stat-lbl">المتبقي</div><div class="stat-val">' + (T - this.qm.answered) + '</div></div>';
  html += '<div class="stat"><div class="stat-lbl">الصحيحة</div><div class="stat-val">' + this.qm.correct + '</div></div>';
  html += '<div class="stat"><div class="stat-lbl">النسبة</div><div class="stat-val">' + this.qm.pct + '%</div></div></div>';
  html += '<div class="pbar"><div class="pfill" style="width:' + this.qm.pct + '%"></div></div>';
  html += '<div class="pag">' + dots + '</div>';
  html += '<div class="qcard"><div><span class="qnum">السؤال ' + (i+1) + ' / ' + T + '</span></div>';
  html += '<div class="qtext">' + q.question + '</div><div class="opts">' + opts + '</div>' + fb + '</div>';
  html += '<div class="nav-row"><button class="btn btn-outline btn-sm" onclick="ui.prev()"' + (this.qm.hasPrev ? '' : ' disabled') + '>← السابق</button>' + nextBtn + '</div>';
  this.app.innerHTML = html;
};
UIController.prototype.select = function(idx) {
  if (this.qm.done || this.qm.isCurrentAnswered) return;
  this.qm.answer(idx);
  this.renderQuiz();
};
UIController.prototype.next = function() { if (this.qm.goNext()) this.renderQuiz(); };
UIController.prototype.prev = function() { if (this.qm.goPrev()) this.renderQuiz(); };
UIController.prototype.goTo = function(i) { if (this.qm.goTo(i)) this.renderQuiz(); };
UIController.prototype.finish = function() {
  var r = this.qm.getResults();
  var m = this.qb.meta(this.qm.cat);
  var rev = '';
  for (var i = 0; i < this.qm.questions.length; i++) {
    var q = this.qm.questions[i];
    var a = this.qm.answers[i];
    var ok = a === q.correct;
    var topic = q._topic || '';
    var ansText = a !== null ? 'إجابتك: <span class="' + (ok ? 'ok' : 'fail') + '">' + q.options[a] + '</span>' : '<span class="fail">لم تجب</span>';
    rev += '<div class="review-item"><div class="rq">' + (i+1) + '. ' + q.question + (topic ? ' <span style="color:var(--text3);font-size:12px">(' + topic + ')</span>' : '') + '</div>';
    rev += '<div class="ra">' + ansText + ' | <span class="ok">' + q.options[q.correct] + '</span>' + (q.exp ? ' • ' + q.exp : '') + '</div></div>';
  }
  var html = '<div class="breadcrumb"><span class="link" onclick="ui.renderHome()">التصنيفات</span><span class="sep">›</span>';
  html += '<span class="link" onclick="ui.openCategory(\'' + this.qm.cat + '\')">' + m.icon + ' ' + this.qm.cat + '</span><span class="sep">›</span><span class="active">' + this.qm.topic + '</span></div>';
  html += '<div class="result-wrap"><div class="icon">' + r.icon + '</div><div class="score">' + r.correct + '/' + r.total + '</div>';
  html += '<div class="sub">' + r.pct + '%</div><div class="details">';
  html += '<div class="det"><div class="n" style="color:var(--success)">' + r.correct + '</div><div class="l">صحيحة ✅</div></div>';
  html += '<div class="det"><div class="n" style="color:var(--danger)">' + r.wrong + '</div><div class="l">خاطئة ❌</div></div>';
  html += '<div class="det"><div class="n" style="color:var(--warn)">' + r.unanswered + '</div><div class="l">لم تُجب ⏭️</div></div></div>';
  html += '<div class="msg ' + r.grade + '">' + r.msg + '</div>';
  html += '<div class="actions"><button class="btn btn-outline btn-sm" onclick="ui.openCategory(\'' + this.qm.cat + '\')">🔙 العودة</button>';
  html += '<button class="btn btn-sm" onclick="ui.retry()">🔄 إعادة الاختبار</button></div></div>';
  html += '<div class="review"><h3>📋 مراجعة الإجابات</h3>' + rev + '</div>';
  this.app.innerHTML = html;
};
UIController.prototype.retry = function() {
  if (this.qm.allMode) this.startAllQuiz(this.qm.cat);
  else this.startQuiz(this.qm.cat, this.qm.topic === 'جميع الموضوعات' ? null : this.qm.topic);
};
UIController.prototype.toast = function(msg) {
  var d = document.getElementById('backdrop');
  d.innerHTML = '<div class="modal"><h3>⚠️ تنبيه</h3><p>' + msg + '</p><div class="actions"><button class="btn btn-sm" onclick="this.closest(\'.backdrop\').classList.remove(\'show\')">حسناً</button></div></div>';
  d.classList.add('show');
};

var ui = new UIController();
</script>
</body>
</html>
